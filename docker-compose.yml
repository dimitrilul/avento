name: avento

services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avento}
      POSTGRES_USER: ${POSTGRES_USER:-avento}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD in .env setzen}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    image: ghcr.io/dimitrilul/avento-backend:latest
    restart: unless-stopped
    init: true
    environment:
      AVENTO_ENVIRONMENT: production
      AVENTO_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-avento}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD in .env setzen}@database:5432/${POSTGRES_DB:-avento}
      AVENTO_SECRET_KEY: ${SECRET_KEY:?SECRET_KEY in .env setzen}
      AVENTO_BOOTSTRAP_INVITE_CODE: ${BOOTSTRAP_INVITE_CODE:?BOOTSTRAP_INVITE_CODE in .env setzen}
      AVENTO_UPLOAD_DIR: /var/lib/avento/uploads
      AVENTO_CORS_ORIGINS: ${PUBLIC_URL:-http://localhost}
      AVENTO_PUBLIC_URL: ${PUBLIC_URL:-http://localhost}
      AVENTO_TIMEZONE: ${TIMEZONE:-Europe/Berlin}
      AVENTO_AUTO_CREATE_SCHEMA: "false"
      AVENTO_MCP_ACCESS_TOKEN_MINUTES: ${MCP_ACCESS_TOKEN_MINUTES:-10}
      AVENTO_MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-http://localhost}
      AVENTO_MCP_RESOURCE_URI: ${MCP_RESOURCE_URI:-}
      AVENTO_MCP_OAUTH_ACCESS_TOKEN_MINUTES: ${MCP_OAUTH_ACCESS_TOKEN_MINUTES:-15}
      AVENTO_MCP_OAUTH_REFRESH_TOKEN_DAYS: ${MCP_OAUTH_REFRESH_TOKEN_DAYS:-30}
      AVENTO_WEATHER_PROVIDER: ${WEATHER_PROVIDER:-open_meteo}
      AVENTO_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AVENTO_OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      AVENTO_OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      AVENTO_GOOGLE_HEALTH_ENABLED: ${GOOGLE_HEALTH_ENABLED:-false}
      AVENTO_GOOGLE_HEALTH_MOCK_MODE: ${GOOGLE_HEALTH_MOCK_MODE:-false}
      AVENTO_GOOGLE_HEALTH_CLIENT_ID: ${GOOGLE_HEALTH_CLIENT_ID:-}
      AVENTO_GOOGLE_HEALTH_CLIENT_SECRET: ${GOOGLE_HEALTH_CLIENT_SECRET:-}
      AVENTO_GOOGLE_HEALTH_REDIRECT_URI: ${GOOGLE_HEALTH_REDIRECT_URI:-}
      AVENTO_GOOGLE_HEALTH_SUCCESS_REDIRECT_URI: ${GOOGLE_HEALTH_SUCCESS_REDIRECT_URI:-}
      AVENTO_GOOGLE_HEALTH_TOKEN_ENCRYPTION_KEY: ${GOOGLE_HEALTH_TOKEN_ENCRYPTION_KEY:-}
      AVENTO_GOOGLE_HEALTH_MIN_SYNC_INTERVAL_SECONDS: ${GOOGLE_HEALTH_MIN_SYNC_INTERVAL_SECONDS:-30}
    volumes:
      - activity_uploads:/var/lib/avento/uploads
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    image: ghcr.io/dimitrilul/avento-web:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  gateway:
    image: caddy:2-alpine
    restart: unless-stopped
    init: true
    environment:
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  activity_uploads:
  caddy_data:
  caddy_config:
