services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avento}
      POSTGRES_USER: ${POSTGRES_USER:-avento}
      POSTGRES_PASSWORD: "Dimadima2.."
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avento} -d ${POSTGRES_DB:-avento}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      AVENTO_ENVIRONMENT: production
      AVENTO_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-avento}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-avento}
      AVENTO_SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      AVENTO_BOOTSTRAP_INVITE_CODE: ${BOOTSTRAP_INVITE_CODE:?Set BOOTSTRAP_INVITE_CODE in .env}
      AVENTO_UPLOAD_DIR: /var/lib/avento/uploads
      AVENTO_CORS_ORIGINS: ${PUBLIC_URL:-http://localhost}
      AVENTO_AUTO_CREATE_SCHEMA: "false"
      AVENTO_WEATHER_PROVIDER: open_meteo
      AVENTO_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AVENTO_OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      AVENTO_OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    volumes:
      - activity_uploads:/var/lib/avento/uploads
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  gateway:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  postgres_data:
  activity_uploads:
  caddy_data:
  caddy_config:
