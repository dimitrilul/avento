name: Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Bei GitHub Container Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend-Image bauen und veröffentlichen
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/dimitrilul/avento-backend:latest
            ghcr.io/dimitrilul/avento-backend:${{ github.sha }}

      - name: Web-Image bauen und veröffentlichen
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          build-args: |
            VITE_API_URL=/api/v1
          tags: |
            ghcr.io/dimitrilul/avento-web:latest
            ghcr.io/dimitrilul/avento-web:${{ github.sha }}
